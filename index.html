<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Ball Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; 
            color: white;
        }
        canvas { 
            border: 4px solid #444; 
            background: #222; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block; 
            margin: 20px auto; 
            border-radius: 8px;
        }
        #status { font-weight: bold; margin-top: 10px; }
        .controls { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>BATTLE BALL 3</h1>
    <div id="status">Connecting to Render server...</div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <p class="controls">Use <b>Arrow Keys</b> to move your ball</p>

    <script>
        const status = document.getElementById("status");
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- THE CONNECTION ---
        const socket = io("https://battle-ball-3.onrender.com");

        let players = {};
        let myId = null;
        let myPos = { x: 400, y: 250 };

        socket.on("connect", () => {
            myId = socket.id;
            status.innerText = "✅ ONLINE: Connected as " + myId.substring(0, 5);
            status.style.color = "#4CAF50";
        });

        socket.on("connect_error", () => {
            status.innerText = "❌ Offline: Waiting for Render to wake up...";
            status.style.color = "#f44336";
        });

        // Listen for other players moving
        socket.on("player_moved", (data) => {
            players[data.id] = { x: data.x, y: data.y };
            requestAnimationFrame(draw);
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid (optional, makes movement feel better)
            ctx.strokeStyle = "#333";
            for(let i=0; i<canvas.width; i+=50) { ctx.strokeRect(i, 0, 50, canvas.height); }

            // Draw ME (Green)
            drawBall(myPos.x, myPos.y, "#4CAF50", "YOU");

            // Draw OTHERS (Red)
            for (let id in players) {
                if (id !== myId) {
                    drawBall(players[id].x, players[id].y, "#f44336", id.substring(0,4));
                }
            }
        }

        function drawBall(x, y, color, label) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(label, x - 12, y - 25);
        }

        // Movement Logic
        window.addEventListener("keydown", (e) => {
            const speed = 10;
            if (e.key === "ArrowUp") myPos.y -= speed;
            if (e.key === "ArrowDown") myPos.y += speed;
            if (e.key === "ArrowLeft") myPos.x -= speed;
            if (e.key === "ArrowRight") myPos.x += speed;

            // Keep inside canvas bounds
            myPos.x = Math.max(20, Math.min(canvas.width - 20, myPos.x));
            myPos.y = Math.max(20, Math.min(canvas.height - 20, myPos.y));
            
            draw();
            socket.emit("move", myPos);
        });

        // Initial draw
        requestAnimationFrame(draw);
    </script>
</body>
</html>
